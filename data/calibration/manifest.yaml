# Calibration Corpus Manifest
#
# Ground-truth expected scores per work/dimension. Scores are 0..1 where 1 is
# maximally present/effective. Passages are supplied at runtime (see
# docs/calibration.md) — the manifest declares slots with `sha256: PENDING` and
# `calibrate init` fills in real hashes.
#
# Quest-only dimensions (choice_hook_quality, update_self_containment,
# choice_meaningfulness, world_state_legibility, action_fidelity) only apply
# when is_quest: true. The harness skips them for novels.

version: 1
scoring:
  # Critic-based score mapping (documented in app/calibration/scorer.py):
  #   score = max(0.0, 1.0 - (num_errors * 0.25 + num_warnings * 0.10))
  critic_error_weight: 0.25
  critic_warning_weight: 0.10

works:
  - id: mrs_dalloway
    title: Mrs. Dalloway
    author: Virginia Woolf
    year: 1925
    pov: third_omniscient_fis
    is_quest: false
    expected:
      free_indirect_quality: 0.95
      interiority_depth: 0.95
      detail_characterization: 0.9
      sensory_density: 0.8
      voice_distinctiveness: 0.85
      sentence_variance: 0.9
      tension_execution: 0.4
      thematic_presence: 0.85
      subtext_presence: 0.9
      clarity: 0.5
      dialogue_ratio: 0.3
      pacing: 0.3
    passages:
      - id: p01
        sha256: PENDING
        expected_high: [free_indirect_quality, interiority_depth, subtext_presence]
        expected_low: [tension_execution, clarity]
      - id: p02
        sha256: PENDING
        expected_high: [sentence_variance, thematic_presence]
        expected_low: [dialogue_ratio, pacing]

