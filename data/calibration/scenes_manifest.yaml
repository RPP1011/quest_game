version: 1
# Scene-scale calibration manifest. Counterpart of manifest.yaml but for arc
# dimensions (2000-4000 word scenes). Expected scores are for arc dims only;
# passage-scale dims live in manifest.yaml.
#
# Quest-only dims (choice_hook_quality, update_self_containment,
# choice_meaningfulness, world_state_legibility) are scored only when
# is_quest=true.
#
# Works listed here must have raw corpus available under data/calibration/raw/
# so that tools/sample_scenes.py can produce s01..s05. Works whose passage
# slots are still PENDING in manifest.yaml are intentionally omitted.
scoring:
  critic_error_weight: 0.25
  critic_warning_weight: 0.1
