- I stand in the square and try to place the village by the shape of its rooftops.
- I unroll the westernmost of my five surveys on the low wall and compare the ridgeline to the horizon.
- I walk the perimeter once, slow, counting doors and noting which have iron on them.
- I find the warden Nesta at the well and ask her, plain as I can, why the village is on none of my maps.
- '"What happened to the cartographer who came before me?" I ask Nesta, not looking away.'
- I ask the boy Corran where the road behind the village goes, and I want a real answer.
- I take the offered seat at the inn table and eat what's put in front of me without asking what it is.
- I wait while the room empties around me and I am the last of the supper.
- I let the silence sit after Nesta says "You'll sleep in the loft tonight," and I don't fill it.
- Nesta tells me not to walk past the old chapel. I thank her and note the direction.
- '"I''ll go where my work takes me," I say, calmly, and roll my surveys back into their tube.'
- When Corran is sent to fetch me back from the lane, I pretend not to have seen him.
- I step through the iron-bound door of the old chapel at the hour Nesta said I should not.
- I cross the chalk-line on the chapel's threshold with my lamp lit and my notebook open.
- I set my lamp on the altar and begin surveying the chapel's interior aloud, the way I was taught.
