- I study the room, looking for who's trying too hard not to be noticed.
- I sit at Merrin's bar and ask whether the Gannet crew came through last week.
- I wait for her answer without filling the silence.
- I order a second drink to give her time to talk.
- I describe the silver shipment to her — weight, markings, the broker's name.
- I let my hand show on the bar, the old burn scar facing up where she'll see it.
- I leave the inn and follow whoever pretends not to follow me.
- I find an alley with one entrance and wait there.
- When my pursuer rounds the corner, I step out and ask their name.
- 'I make the offer plain: tell me about the cargo or I tell the harbour master what I already know.'
- I follow the broker's trail through the salt warehouses on the east side of the harbour.
- I find the dockhand who loaded the Gannet's cargo and buy him the cheapest thing on the menu.
- I ask him what Callen's name sounded like when the broker spoke it aloud.
- I wait outside Callen's counting-house until the clerk leaves for the evening.
- I pick the side door's lock and let myself into the back office without hurrying.
- I read the ledger entries for the week of the shipment and copy the numbers that don't match.
- When Callen returns, I am sitting in his chair with the ledger open on the desk.
- '"Tell me who you were fencing for," I say, "or I walk these pages to the harbour master."'
- I watch Callen's hands while he talks, and I count the lies by the pauses between them.
- I leave the counting-house with the ledger under my coat and the name he gave me folded inside it.
