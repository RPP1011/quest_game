  voice_samples:
    - "The regent spoke of tradition the way a gambler speaks of luck \u2014 constantly, and only after winning."
    - "Ceriel's silences were the kind you had to pay for; his words were cheaper."
    - "Oren bowed. He didn't mean it. Everyone in the room knew he didn't mean it, and that was the point."
    - "The antechamber was built for three conversations to happen in it at once \u2014 one out loud for the regent, one at the window between two dukes, and a third in the corner of the room where the envoy and the spymaster would not appear to have met, though of course they had."
