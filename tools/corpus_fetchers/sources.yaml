# Source map for calibration corpus fetchers.
#
# Keys are work_ids matching data/calibration/manifest.yaml. Each entry
# declares the fetcher type and its parameters. Fields with "VERIFY" have
# not been confirmed against a live HTTPS probe and should be checked by
# the user before relying on them.
#
# Types:
#   gutenberg      — Project Gutenberg plain-text by numeric id
#   standard_ebooks — Standard Ebooks plain-text (fallback)
#   sv_forum       — Sufficient Velocity quest thread with threadmarks
#   wordpress      — WordPress TOC page whose anchors enumerate chapters

works:
  pride_and_prejudice:
